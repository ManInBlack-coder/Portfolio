name: CI

on:
  push:
  pull_request:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: node --check server.js

      - name: Start server and verify response
        run: |
          node server.js &
          SERVER_PID=$!
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3015/ > /dev/null; then
              echo "Server responded successfully"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "Server did not respond in time"
          kill $SERVER_PID
          exit 1
